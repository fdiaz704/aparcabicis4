arb-dir: lib/l10n
template-arb-file: app_es.arb
output-localization-file: app_localizations.dart
output-class: AppLocalizations
nullable-getter: false
# El español es el idioma por defecto (primero en supportedLocales), de modo
# que en dispositivos con idioma no soportado la app recae en castellano.
preferred-supported-locales:
  - es
